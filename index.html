<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>YIN Ying</title>

  <style>
    body {
      margin: 0;
      background: white;
      color: black;

      font-family:
        Arial,
        "Helvetica Neue",
        Helvetica,
        sans-serif;
    }

    .wrap {
      margin-left: 160px;
      margin-top: 160px;
    }

    .grid {
      display: grid;

      grid-template-columns: auto auto;

      column-gap: 48px;
      row-gap: 4px;

      justify-content: start;
      align-items: start;
    }

    .en {
      font-size: 64px;

      font-weight: 700;

      line-height: 0.9;

      letter-spacing: -0.06em;
    }

    .cn {
      font-size: 34px;

      font-weight: 500;

      line-height: 1;

      letter-spacing: 0.02em;
    }

    .space-large {
      height: 5em;
    }

    .space-small {
      height: 3em;
    }

    .menu {
      font-size: 18px;

      line-height: 1.9;

      font-weight: 400;

      letter-spacing: -0.01em;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="grid">

      <div class="en">YIN</div>
      <div class="en">Ying</div>

      <div class="cn">殷</div>
      <div class="cn">鶯</div>

    </div>

    <div class="space-large"></div>

    <div class="menu">
      <div>Traces of Sentience</div>
      <div>The flowing river never stops</div>
      <div>Living by the river</div>
      <div>Wind of Okhotsk</div>
      <div>Hypnopompic Hallucinations</div>
    </div>

    <div class="space-small"></div>

    <div class="menu">
      <div>About</div>
      <div>Contact</div>
    </div>

  </div>

</body>

</html>
