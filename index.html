<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>YIN Ying</title>

  <style>
    body {
      margin: 0;
      background: white;
      color: black;

      font-family:
        Arial,
        "Helvetica Neue",
        Helvetica,
        sans-serif;
    }

    .wrap {
      margin-left: 160px;
      margin-top: 160px;
    }

    .grid {
      display: grid;

      grid-template-columns: auto auto;

      column-gap: 72px;
      row-gap: 8px;

      justify-content: start;
      align-items: start;
    }

    .en {
      font-size: 96px;

      font-weight: 700;

      line-height: 0.9;

      letter-spacing: -0.06em;
    }

    .cn {
      font-size: 48px;

      font-weight: 500;

      line-height: 1;

      letter-spacing: 0.02em;
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="grid">

      <div class="en">YIN</div>
      <div class="en">Ying</div>

      <div class="cn">殷</div>
      <div class="cn">鶯</div>

    </div>

  </div>

</body>

</html>
